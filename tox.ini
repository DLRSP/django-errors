[tox]
isolated_build = True
# envlist drives the GitHub Actions matrix (one job per py/django combination).
# Split factors by Django Python support (3.2: <=3.10, 4.2: <=3.12, 5.2: >=3.10).
envlist =
    py{38,39,310}-django{32},
    py{38,39,310,311,312}-django{42},
    py{310,311,312,313,314}-django{52}

[testenv]
commands = python -W error::DeprecationWarning -W error::PendingDeprecationWarning -m coverage run --parallel -m pytest {posargs:tests}
deps =
    -r requirements/{envname}.txt
commands_pre =
    sh -c 'python -m pip install --upgrade --no-deps -r "https://raw.githubusercontent.com/DLRSP/requirements/main/$(echo {envname} | cut -d- -f1)-dev.txt"'
    python -m django compilemessages --settings=tests.settings

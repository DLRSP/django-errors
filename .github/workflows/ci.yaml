---
name: CI/CD

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    uses: DLRSP/workflows/.github/workflows/ci.yaml@main
    with:
      requirements-ref: main
      install-test-deps: false
      assert-wheel-locks: true
    secrets: inherit
